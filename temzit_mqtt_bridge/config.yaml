name: "Temzit MQTT Bridge"
version: "0.1.0"
slug: "temzit_mqtt_bridge"
description: "Local TCP to MQTT bridge for Temzit heat pumps"
url: "https://github.com/daemon707/temzit-addon/tree/main/temzit_mqtt_bridge"
arch:
  - amd64
  - aarch64
  - armv7
startup: application
boot: auto
init: false
host_network: true
map:
  - config:rw
options:
  temzit_host: "192.168.2.20"
  temzit_port: 333
  temzit_timeout: 5
  temzit_sync_interval: 30
  temzit_cfg_interval: 300
  temzit_retry_delay: 3
  mqtt_host: "192.168.1.50"
  mqtt_port: 1883
  mqtt_user: "addons"
  mqtt_pass: ""
  mqtt_prefix: "temzit"
  mqtt_discovery_prefix: "homeassistant"
  mqtt_client_id: "temzit-bridge"
schema:
  temzit_host: str
  temzit_port: port
  temzit_timeout: float
  temzit_sync_interval: int(10,3600)
  temzit_cfg_interval: int(30,86400)
  temzit_retry_delay: float
  mqtt_host: str
  mqtt_port: port
  mqtt_user: str?
  mqtt_pass: password?
  mqtt_prefix: str
  mqtt_discovery_prefix: str
  mqtt_client_id: str
