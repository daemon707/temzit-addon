name: "Темзит MQTT Bridge"
version: "0.5.0"
slug: temzit_mqtt
description: "Интеграция теплового насоса Темзит с Home Assistant через MQTT Discovery"
arch: [aarch64, amd64, armhf, armv7, i386]
startup: application
boot: auto
init: false
options:
  temzit_host: "service.temzit.ru"
  temzit_login: ""
  temzit_password: ""
  temzit_serial: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_prefix: "temzit"
  poll_interval: 60
schema:
  temzit_host: str
  temzit_login: str
  temzit_password: str
  temzit_serial: str
  mqtt_host: str
  mqtt_port: int
  mqtt_user: str
  mqtt_password: str
  mqtt_prefix: str
  poll_interval: int
map: []
