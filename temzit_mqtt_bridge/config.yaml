name: "Temzit MQTT Bridge"
version: "0.6.0"
slug: "temzit_mqtt_bridge"
description: "Local TCP→MQTT bridge for Temzit heat pumps with climate entity and write support"
url: "https://github.com/daemon707/temzit-addon/tree/main/temzit_mqtt_bridge"
arch:
- amd64
- aarch64
startup: application
boot: auto
init: false
host_network: true
options:
  temzit_host: ""
  temzit_port: 333
  temzit_timeout: 15
  temzit_sync_interval: 60
  temzit_cfg_interval: 900
  temzit_cfg_delay_after_sync: 12
  temzit_retry_delay: 15
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  mqtt_prefix: "temzit"
  mqtt_discovery_prefix: "homeassistant"
  mqtt_client_id: "temzit-bridge"
schema:
  temzit_host: str
  temzit_port: int?
  temzit_timeout: int?
  temzit_sync_interval: int?
  temzit_cfg_interval: int?
  temzit_cfg_delay_after_sync: int?
  temzit_retry_delay: int?
  mqtt_host: str
  mqtt_port: int?
  mqtt_user: str?
  mqtt_pass: str?
  mqtt_prefix: str?
  mqtt_discovery_prefix: str?
  mqtt_client_id: str?
